<!DOCTYPE html>
<html>
    <head>
        <title>Registration Form</title>
        <link rel="stylesheet" href="registerCSS.css">
    </head>

    <body>
        <center>
            <div class="container">
                <form id="registerForm">
                    <h1>Register</h1><br>
                    
                    <input type="text" placeholder="Name" id="nameInput" required><br><br>
                    <input type="email" placeholder="Email" id="emailInput" required><br><br>
                    <input type="password" placeholder="Password" id="passInput" required><br><br>
                    <input type="number" placeholder="Age" id="ageInput" required><br><br>

                    <button type="submit">Submit</button>
                </form>
            </div>
        </center>

        <script src="registerJS.js"></script>
    </body>
</html>
